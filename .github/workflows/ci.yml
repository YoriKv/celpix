name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The three target platforms for release binaries later.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # PySide6's offscreen platform plugin still links a handful of system
      # libraries that GitHub's Linux runner does not ship by default.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Sync dependencies
        run: uv sync --frozen

      # Ruff lint/format are advisory: they report issues but never fail the
      # build, so a style nit can't block a release. continue-on-error still runs
      # the step and surfaces its output/annotations, just without a hard fail.
      - name: Lint
        run: uv run ruff check .
        continue-on-error: true

      - name: Format check
        run: uv run ruff format --check .
        continue-on-error: true

      - name: Test
        run: uv run pytest
        env:
          QT_QPA_PLATFORM: offscreen
