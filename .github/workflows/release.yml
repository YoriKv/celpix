name: Release

# Push a version tag (e.g. `v0.1.0`) to build the app for Windows, Linux, and
# macOS with PyInstaller and publish a GitHub Release with the artifacts:
#   - celpix-<version>-win.zip       (portable Windows app folder, zipped)
#   - celpix-<version>-linux.tar.gz  (portable Linux app folder, tarred)
#   - celpix-<version>-mac-arm64.zip (macOS .app bundle, Apple Silicon)
#   - celpix-<version>-mac-intel.zip (macOS .app bundle, Intel)
# The release body is the matching `## v<version>` section of CHANGELOG.md
# (auto-generated commit notes are appended; if the section is missing, the
# release falls back to the auto notes alone).
#
# Structure mirrors the CI workflow: a per-OS `build` matrix always uploads its
# artifact to the run; a single `release` job (tag push only) downloads them all
# and publishes ONE release, so the OS builds never race to create it. A manual
# run (workflow_dispatch) runs only the build matrix — handy for testing the
# build without publishing anything.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: celpix-win
            # PowerShell: zip the onedir output folder.
            package: Compress-Archive -Path dist/celpix/* -DestinationPath dist/celpix-win.zip
            artifact: dist/celpix-win.zip
          - os: ubuntu-latest
            asset: celpix-linux
            package: tar -czf dist/celpix-linux.tar.gz -C dist celpix
            artifact: dist/celpix-linux.tar.gz
          # Two native macOS builds. uv's Python is single-arch, so PyInstaller
          # can't emit a universal2 app — instead each architecture builds on
          # its own runner. macos-latest is Apple Silicon; macos-15-intel is
          # GitHub's last x86_64 image (hosted until Aug 2027).
          - os: macos-latest
            asset: celpix-mac-arm64
            # --windowed produces celpix.app; zip it (ditto preserves bundle bits).
            package: ditto -c -k --keepParent dist/celpix.app dist/celpix-mac-arm64.zip
            artifact: dist/celpix-mac-arm64.zip
          - os: macos-15-intel
            asset: celpix-mac-intel
            package: ditto -c -k --keepParent dist/celpix.app dist/celpix-mac-intel.zip
            artifact: dist/celpix-mac-intel.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # PySide6 links a handful of system libraries the Linux runner does not
      # ship by default; PyInstaller must find them at build time to bundle them.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Sync dependencies
        run: uv sync --frozen

      # --windowed: no console window on Win/macOS (a no-op on Linux). PySide6's
      # bundled PyInstaller hooks pull in the Qt plugins automatically.
      # --collect-data: PyInstaller only follows imports, so the package's data
      # files (shipped presets, plugin examples under celpix/resources) must be
      # collected explicitly or the frozen app starts without them.
      # pyinstaller is pulled in ephemerally with --with so it need not live in
      # the dev dependency group / uv.lock.
      - name: Build app
        run: >
          uv run --with pyinstaller pyinstaller
          --name celpix --windowed --noconfirm
          --collect-data celpix
          src/celpix/__main__.py

      # PyInstaller stamps LSMinimumSystemVersion from the build Python's own
      # deployment target (e.g. 11.0 on arm64), but the app's real floor is
      # Qt's: PySide6 6.10+ wheels are macosx_13_0. Stamp the honest minimum so
      # older systems get a clear "requires macOS 13" dialog instead of a
      # launch crash, then re-sign — editing Info.plist invalidates the ad-hoc
      # signature PyInstaller applied, and arm64 refuses unsigned binaries.
      - name: Stamp minimum macOS version
        if: runner.os == 'macOS'
        run: |
          PLIST=dist/celpix.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 13.0" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 13.0" "$PLIST"
          codesign --force --deep --sign - dist/celpix.app

      # Split by OS: the `shell` key takes no expressions, so we can't pick it with
      # ${{ runner.os … }}. `if:` does allow the runner context, and only the matching
      # step runs. Windows packages with PowerShell (Compress-Archive); the rest bash.
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.package }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.package }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.artifact }}

  release:
    # Tag push only: gather all OS builds and publish a single release.
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Pull this version's section out of CHANGELOG.md for the release body.
      # Matches the heading's second field against the tag (`## v0.1.0 - …`), so
      # a trailing date / "unreleased" note is ignored. No matching section ⇒
      # empty file ⇒ auto-generated notes only.
      - name: Extract changelog section
        run: |
          awk -v tag="${GITHUB_REF_NAME}" '
            /^## / { on = ($2 == tag) ; next }
            on' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::CHANGELOG.md has no \"## ${GITHUB_REF_NAME}\" section — release body will be auto-generated notes only."
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
