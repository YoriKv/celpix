# RGB888 — 3 bytes per entry in file order R, G, B (big-endian assembly).
# See docs/graphics-formats-reference/implementation-guide.md §4.
id = "preset.palette.rgb888"
name = "RGB888"
stage = "interpret-palette"
engine_id = "codec.color-mask"

[params]
bytes_per_entry = 3
byte_order = "big"

[params.masks]
r = 0xFF0000
g = 0x00FF00
b = 0x0000FF
