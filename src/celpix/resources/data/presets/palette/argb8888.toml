# ARGB8888 — file byte order R,G,B,A, read as little-endian u32.
# See docs/graphics-formats-reference/implementation-guide.md §4 (packed color formats).
id = "preset.palette.argb8888"
name = "ARGB8888 (file R,G,B,A)"
engine_id = "codec.color-mask"

[params]
bytes_per_entry = 4
byte_order = "little"

[params.masks]
a = 0xFF000000
r = 0x000000FF
g = 0x0000FF00
b = 0x00FF0000
