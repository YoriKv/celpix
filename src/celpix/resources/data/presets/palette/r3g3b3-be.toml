# Big-endian variant of R3G3B3 (9-bit) — for big-endian palette data.
# See docs/graphics-formats-reference/implementation-guide.md §4 (packed color formats).
id = "preset.palette.r3g3b3-be"
name = "R3G3B3 (9-bit) (big-endian)"
engine_id = "codec.color-mask"

[params]
bytes_per_entry = 2
byte_order = "big"

[params.masks]
r = 0x0070
g = 0x0700
b = 0x0007
