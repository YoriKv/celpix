# RGB565 — R5 G6 B5, little-endian u16.
# See docs/graphics-formats-reference/implementation-guide.md §4 (packed colour formats).
id = "preset.palette.rgb565"
name = "RGB565"
engine_id = "codec.color-mask"

[params]
bytes_per_entry = 2
byte_order = "little"

[params.masks]
r = 0xF800
g = 0x07E0
b = 0x001F
