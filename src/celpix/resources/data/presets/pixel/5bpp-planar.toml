# 5bpp per-row interleaved planar (PL04).
# See docs/graphics-formats-reference/implementation-guide.md §2 (planar plane-offset table).
id = "preset.pixel.5bpp-planar"
name = "5bpp planar (8x8)"
engine_id = "codec.planar"

[params]
bpp = 5
planes = [
  { base = 0, stride = 5 },
  { base = 1, stride = 5 },
  { base = 2, stride = 5 },
  { base = 3, stride = 5 },
  { base = 4, stride = 5 },
]
