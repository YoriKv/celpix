# Big-endian variant of RGB888 direct (8x8) — for big-endian ROM data (e.g. N64).
# See docs/graphics-formats-reference/implementation-guide.md §3 (direct-color tiles).
id = "preset.pixel.dc-rgb888-be"
name = "RGB888 direct (8x8) (big-endian)"
engine_id = "codec.direct-color"

[params]
bpp = 24
bytes_per_pixel = 3
byte_order = "big"

[params.masks]
r = 0xFF0000
g = 0xFF00
b = 0x00FF
