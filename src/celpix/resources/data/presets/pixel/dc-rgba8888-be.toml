# Big-endian variant of RGBA8888 direct (8x8) — for big-endian ROM data (e.g. N64).
# See docs/graphics-formats-reference/implementation-guide.md §3 (direct-colour tiles).
id = "preset.pixel.dc-rgba8888-be"
name = "RGBA8888 direct (8x8) (big-endian)"
engine_id = "codec.direct-color"

[params]
bpp = 32
bytes_per_pixel = 4
byte_order = "big"

[params.masks]
a = 0x000000FF
r = 0xFF000000
g = 0x00FF0000
b = 0x0000FF00
