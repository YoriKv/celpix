# Big-endian variant of RGBA5551 direct (N64, 8x8) — for big-endian ROM data (e.g. N64).
# See docs/graphics-formats-reference/implementation-guide.md §3 (direct-colour tiles).
id = "preset.pixel.dc-rgba5551-be"
name = "RGBA5551 direct (N64, 8x8) (big-endian)"
engine_id = "codec.direct-color"

[params]
bpp = 16
bytes_per_pixel = 2
byte_order = "big"

[params.masks]
a = 0x0001
r = 0xF800
g = 0x07C0
b = 0x003E
