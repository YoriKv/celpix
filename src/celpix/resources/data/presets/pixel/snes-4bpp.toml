# SNES / PCE-CG 4bpp tiles — two interleaved plane-pairs, pairs 16 bytes apart.
# Matches *.4bpp.sfc sheets. See docs/graphics-formats-reference/implementation-guide.md §2.
id = "preset.pixel.snes-4bpp"
name = "SNES 4bpp (8x8)"
engine_id = "codec.planar"

[params]
bpp = 4
planes = [
  { base = 0, stride = 2 },
  { base = 1, stride = 2 },
  { base = 16, stride = 2 },
  { base = 17, stride = 2 },
]
