# Big-endian variant of BGR565 direct (8x8) — for big-endian ROM data (e.g. N64).
# See docs/graphics-formats-reference/implementation-guide.md §3 (direct-color tiles).
id = "preset.pixel.dc-bgr565-be"
name = "BGR565 direct (8x8) (big-endian)"
engine_id = "codec.direct-color"

[params]
bpp = 16
bytes_per_pixel = 2
byte_order = "big"

[params.masks]
r = 0x001F
g = 0x07E0
b = 0xF800
