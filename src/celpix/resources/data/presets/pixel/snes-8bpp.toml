# SNES 8bpp planar — four interleaved plane-pairs, 16 bytes apart (CP03).
# See docs/graphics-formats-reference/implementation-guide.md §2 (planar plane-offset table).
id = "preset.pixel.snes-8bpp"
name = "SNES 8bpp planar (8x8)"
engine_id = "codec.planar"

[params]
bpp = 8
planes = [
  { base = 0, stride = 2 },
  { base = 1, stride = 2 },
  { base = 16, stride = 2 },
  { base = 17, stride = 2 },
  { base = 32, stride = 2 },
  { base = 33, stride = 2 },
  { base = 48, stride = 2 },
  { base = 49, stride = 2 },
]
